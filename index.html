<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ONVO OS — تسجيل الدخول</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .form-input-icon .icon{right:15px;left:auto;}
  .form-input-icon .form-input{padding-right:44px;padding-left:18px;}
  .shape{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(80px);opacity:.12;}
  .shape-1{width:500px;height:500px;top:-150px;right:-150px;background:radial-gradient(circle,var(--blue),var(--violet));}
  .shape-2{width:400px;height:400px;bottom:-100px;left:-100px;background:radial-gradient(circle,var(--violet),var(--cyan));}
  .login-stats{display:flex;gap:0;margin-bottom:36px;border:1px solid var(--border-1);border-radius:12px;overflow:hidden;background:var(--glass-1);}
  .login-stat{flex:1;text-align:center;padding:12px 8px;position:relative;}
  .login-stat:not(:last-child)::after{content:'';position:absolute;left:0;top:20%;height:60%;width:1px;background:var(--border-1);}
  .login-stat-val{font-family:'Cairo',sans-serif;font-size:1.2rem;font-weight:900;color:var(--blue-bright);display:block;}
  .login-stat-label{font-size:.65rem;color:var(--t3);letter-spacing:.5px;}
  .reset-modal{position:fixed;inset:0;background:rgba(2,3,10,.85);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;z-index:999;padding:20px;}
  .reset-modal.open{display:flex;}
  .reset-box{background:rgba(8,12,31,.97);border:1px solid var(--border-2);border-radius:var(--r-lg);padding:36px;width:100%;max-width:420px;box-shadow:var(--sh-float);animation:modalIn .35s cubic-bezier(.2,.8,.2,1);}
  @keyframes modalIn{from{opacity:0;transform:scale(.9) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
  .reset-box h3{font-size:1.15rem;margin-bottom:6px;}
  .reset-box p{color:var(--t3);font-size:.85rem;margin-bottom:22px;}
  .success-note{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:var(--r-sm);padding:11px 14px;font-size:.83rem;color:#34d399;margin-top:12px;display:none;}
  .success-note.show{display:block;}
</style>
</head>
<body>
<div class="ambient"></div>
<div class="ambient-mid"></div>
<div class="grid-overlay"></div>
<canvas id="particles"></canvas>
<div class="shape shape-1"></div>
<div class="shape shape-2"></div>

<!-- مودال: استعادة كلمة المرور -->
<div class="reset-modal" id="resetModal">
  <div class="reset-box">
    <h3>🔑 استعادة كلمة المرور</h3>
    <p>أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة التعيين</p>
    <div class="form-group"><input class="form-input" type="email" id="resetEmail" placeholder="example@company.com"/></div>
    <button class="btn-primary" onclick="sendReset()">إرسال رابط الاستعادة</button>
    <div class="success-note" id="resetSuccess">✅ تم الإرسال! تفقّد بريدك.</div>
    <div style="text-align:center;margin-top:16px"><span style="font-size:.8rem;color:var(--t3)" onclick="closeReset()">إغلاق</span></div>
  </div>
</div>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark" style="width:48px;height:48px;border-radius:14px;font-size:18px;background:linear-gradient(135deg,var(--blue),var(--violet));display:flex;align-items:center;justify-content:center;font-weight:900;font-family:'Cairo',sans-serif;color:#fff;box-shadow:0 4px 20px var(--blue-glow);animation:logoPulse 3s ease-in-out infinite;flex-shrink:0">OS</div>
      <div class="login-logo-text">
        <h2>ONVO OS</h2>
        <span>منصة الفريق المتكاملة</span>
      </div>
    </div>

    <div class="login-stats">
      <div class="login-stat"><span class="login-stat-val">٩٨٪</span><span class="login-stat-label">رضا الفريق</span></div>
      <div class="login-stat"><span class="login-stat-val">٢.٤×</span><span class="login-stat-label">الإنتاجية</span></div>
      <div class="login-stat"><span class="login-stat-val">٢٤/٧</span><span class="login-stat-label">متاح دائماً</span></div>
    </div>

    <h1 class="login-headline" id="loginHeadline">أهلاً بعودتك</h1>
    <p class="login-sub" id="loginSub">سجّل دخولك للوصول إلى لوحة التحكم</p>

    <div class="login-error" id="loginError"><span>⚠</span> <span id="loginErrorMsg"></span></div>

    <div class="form-group form-input-icon">
      <label class="form-label">البريد الإلكتروني</label>
      <span class="icon">✉</span>
      <input class="form-input" type="email" id="emailInput" placeholder="example@company.com" autocomplete="email"/>
    </div>

    <div class="form-group form-input-icon">
      <label class="form-label">كلمة المرور</label>
      <span class="icon">🔒</span>
      <input class="form-input" type="password" id="passwordInput" placeholder="••••••••"
        autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()"/>
    </div>

    <div class="forgot-row"><a class="forgot-link" onclick="openReset()">نسيت كلمة المرور؟</a></div>

    <button class="btn-primary" id="loginBtn" onclick="doLogin()">الدخول إلى لوحة التحكم ←</button>

    <div class="login-footer"><a href="#">سياسة الخصوصية</a> · <a href="#">الشروط</a> · ONVO OS v3.1</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gvvsxsgtavtosqgljocm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ufzr1mt08Df_ljtKUwhFyg_of6yynQy';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// جملة ترحيب ذكية
(function(){
  const h = new Date().getHours();
  const greet = h<12?'صباح النور':'h<18'?'مساء النور':'مساء النور';
  const g = h<12?'صباح النور':h<18?'مساء النور':'مساء الخير';
  const sub = h<12?'☀ نورت الشركة النهارده':h<18?'🌤 نورت الشركة':'🌙 نورت الشركة الليلة';
  document.getElementById('loginHeadline').textContent = g + '!';
  document.getElementById('loginSub').textContent = sub + ' — سجّل دخولك للمتابعة';
})();

// تحقق لو متسجل
(async()=>{
  if(document.referrer.includes('app.html')) return;
  try{ const{data:{session}}=await sb.auth.getSession(); if(session) window.location.href='app.html'; }catch(e){}
})();

async function doLogin() {
  const email = document.getElementById('emailInput').value.trim();
  const pass  = document.getElementById('passwordInput').value;
  const btn   = document.getElementById('loginBtn');
  if(!email||!pass){ showError('يرجى ملء جميع الحقول.'); return; }

  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> جاري التحقق…';

  try {
    const{data:authData,error:authErr}=await sb.auth.signInWithPassword({email,password:pass});
    if(authErr) throw authErr;

    let{data:profile}=await sb.from('profiles').select('*').eq('id',authData.user.id).single();

    if(!profile){
      // أول تسجيل — تحقق لو أول مستخدم
      const{count}=await sb.from('profiles').select('*',{count:'exact',head:true});
      const isFirst=(count===0);
      const newP={
        id:authData.user.id, email,
        name:authData.user.user_metadata?.name||email.split('@')[0],
        role:isFirst?'founder':'standard',
      };
      await sb.from('profiles').insert(newP);
      profile=newP;
      if(isFirst) showToast && showToast('مبروك! أنت الـ Founder 👑','🎉','blue');
    }

    const userData = JSON.stringify({
      id:profile.id, email:profile.email, name:profile.name,
      role:profile.role, whatsapp:profile.whatsapp
    });
    sessionStorage.setItem('onvo_user', userData);
    localStorage.setItem('onvo_user', userData);

    btn.innerHTML=`✓ أهلاً ${profile.name.split(' ')[0]}، جاري التحويل…`;
    setTimeout(()=>{ window.location.href='app.html'; },600);

  }catch(err){
    const msgs={
      'Invalid login credentials':'البريد الإلكتروني أو كلمة المرور غير صحيحة.',
      'Email not confirmed':'يرجى تأكيد بريدك الإلكتروني أولاً.',
      'Failed to fetch':'تعذّر الاتصال، تحقق من الإنترنت.',
    };
    showError(msgs[err.message]||`خطأ: ${err.message}`);
    btn.disabled=false;
    btn.innerHTML='الدخول إلى لوحة التحكم ←';
  }
}

function openReset(){ document.getElementById('resetModal').classList.add('open'); }
function closeReset(){ document.getElementById('resetModal').classList.remove('open'); document.getElementById('resetSuccess').classList.remove('show'); }
async function sendReset(){
  const email=document.getElementById('resetEmail').value.trim(); if(!email) return;
  await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/index.html'});
  document.getElementById('resetSuccess').classList.add('show');
}
function showError(msg){
  const el=document.getElementById('loginError');
  document.getElementById('loginErrorMsg').textContent=msg;
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),4500);
}

// Particles
(function(){
  const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
  function resize(){canvas.width=innerWidth;canvas.height=innerHeight;} resize(); window.addEventListener('resize',resize);
  const pts=Array.from({length:70},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.4+.4}));
  function frame(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(99,102,241,0.55)';ctx.fill();});
    pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{const d=Math.hypot(a.x-b.x,a.y-b.y);if(d<120){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(99,102,241,${.18*(1-d/120)})`;ctx.lineWidth=.7;ctx.stroke();}}));
    requestAnimationFrame(frame);
  }
  frame();
})();

// 3D tilt
const card=document.querySelector('.login-card');
document.addEventListener('mousemove',e=>{
  if(!card) return;
  const r=card.getBoundingClientRect();
  const dx=(e.clientX-r.left-r.width/2)/r.width, dy=(e.clientY-r.top-r.height/2)/r.height;
  card.style.transform=`perspective(1000px) rotateY(${dx*5}deg) rotateX(${-dy*5}deg)`;
  card.style.transition='transform .1s ease-out';
});
document.addEventListener('mouseleave',()=>{ if(card){card.style.transform='';card.style.transition='transform .6s cubic-bezier(.2,.8,.2,1)';} });
</script>
</body>
</html>
